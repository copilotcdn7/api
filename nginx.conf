server {
    listen 8080;  # Cloud Run 8080 bekliyor - bunu degistirme!

    location /FR {
        proxy_pass https://194.33.34.66:443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host 194.33.34.66;
        proxy_ssl_verify off;              # SSL sertifika dogrulamayi kapat
        proxy_ssl_server_name on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    location /GR {
        proxy_pass https://89.169.53.227:443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host 89.169.53.227;
        proxy_ssl_verify off;              # SSL sertifika dogrulamayi kapat
        proxy_ssl_server_name on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    location / {
        return 404;
    }
}

